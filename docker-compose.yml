services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: moussy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moussy_secret}
      POSTGRES_DB: moussy_campaign
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moussy -d moussy_campaign"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://moussy:${POSTGRES_PASSWORD:-moussy_secret}@db:5432/moussy_campaign
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin2026}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme_in_production}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
